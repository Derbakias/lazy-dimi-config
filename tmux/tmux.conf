# Change prefix
set -g prefix C-Space

# Unbind old prefix
unbind C-b

# Allow sending prefix to nested tmux sessions
bind C-Space send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse scrolling
set -g mouse on

# Sane scrolling
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# Scroll History
set -g history-limit 30000

# Vi-style keys in copy mode
setw -g mode-keys vi

# Project switcher: prefix + f -> fuzzy project picker as a floating popup.
# No new window is created. The script reads the caller pane id via
# `tmux display-message -p '#{pane_id}'` from inside the popup.
bind-key f display-popup -E -w 80% -h 80% tmux-sessionizer

# Nvim-style splits (prefix + s = horizontal, prefix + v = vertical).
# Open the new pane in the same directory as the current one.
unbind s
unbind v
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# True color + italics
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Snappy escape for nvim
set -sg escape-time 10

# Pass through Shift+Enter and other modified keys (for Claude Code, etc.)
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

# Renumber windows when one is closed, set titles
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S / #W"

# Focus events for nvim autoread
set -g focus-events on

# ------------------------------------------------------------------
# Theme: Catppuccin Mocha (matches nvim colorscheme)
# ------------------------------------------------------------------
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"
thm_surface0="#313244"
thm_surface1="#45475a"
thm_overlay0="#6c7086"
thm_subtext0="#a6adc8"
thm_blue="#89b4fa"
thm_lavender="#b4befe"
thm_mauve="#cba6f7"
thm_green="#a6e3a1"
thm_peach="#fab387"
thm_red="#f38ba8"
thm_yellow="#f9e2af"

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=$thm_bg,fg=$thm_fg"

# Left: session name
set -g status-left-length 100
set -g status-left "#[bg=$thm_mauve,fg=$thm_bg,bold]  #S #[bg=$thm_bg,fg=$thm_mauve]"

# Right: system stats + cwd + time
set -g status-right-length 200
set -g status-right "#[fg=$thm_surface0]#[bg=$thm_surface0,fg=$thm_subtext0] #(~/.local/bin/tmux-stats) #[bg=$thm_bg,fg=$thm_blue]#[bg=$thm_blue,fg=$thm_bg] #(basename \"#{pane_current_path}\") #[bg=$thm_bg,fg=$thm_surface1] #[bg=$thm_surface1,fg=$thm_fg]  %H:%M    %d %b "

# Window status
set -g window-status-separator ""
set -g window-status-format "#[bg=$thm_bg,fg=$thm_overlay0]  #I #W  "
set -g window-status-current-format "#[bg=$thm_bg,fg=$thm_peach]#[bg=$thm_peach,fg=$thm_bg,bold]  #I #W #[bg=$thm_bg,fg=$thm_peach]"

# Pane borders
set -g pane-border-style "fg=$thm_surface1"
set -g pane-active-border-style "fg=$thm_mauve"

# Messages / command line
set -g message-style "bg=$thm_surface0,fg=$thm_peach"
set -g message-command-style "bg=$thm_surface0,fg=$thm_peach"

# Copy mode selection
set -g mode-style "bg=$thm_surface1,fg=$thm_fg"

# ------------------------------------------------------------------
# vim-tmux-navigator (tmux side): unify C-h/j/k/l across nvim + tmux
# ------------------------------------------------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ------------------------------------------------------------------
# Plugins (via TPM)
# ------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect: restore nvim sessions, pane contents, common processes
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'npm node python ssh "~npm run dev" "~npm run start" "~yarn dev"'

# Continuum: auto-save every 15min. Auto-restore is OFF on purpose — restoring
# a stale session after intentionally closing is more annoying than helpful.
# To restore manually (e.g. after a crash or reboot): prefix + Ctrl-r
set -g @continuum-save-interval '15'
set -g @continuum-restore 'off'

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
